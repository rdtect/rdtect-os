# =============================================================================
# rdtect OS - Production Nginx Configuration
# =============================================================================
# This nginx config is for deployments where you want nginx as a reverse proxy
# instead of using Coolify's built-in Traefik.
#
# Use cases:
# - Deploying without Coolify
# - Custom nginx requirements
# - Local production testing
# =============================================================================

# Worker configuration
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # -------------------------------------------------------------------------
    # Basic Settings
    # -------------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security headers (set in server blocks)
    server_tokens off;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # Upstream Services
    # -------------------------------------------------------------------------

    # SvelteKit Frontend (Node.js server)
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # Python Backend (FastAPI)
    upstream python_backend {
        server python-backend:8000;
        keepalive 16;
    }

    # PocketBase
    upstream pocketbase {
        server pocketbase:8090;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # Rate Limiting
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # -------------------------------------------------------------------------
    # Main Server Block
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Redirect HTTP to HTTPS (uncomment in production with SSL)
        # return 301 https://$server_name$request_uri;

        # Root location (for non-SSL setup or behind a load balancer)
        include /etc/nginx/conf.d/locations.conf;
    }

    # -------------------------------------------------------------------------
    # HTTPS Server Block (Uncomment for SSL termination at nginx)
    # -------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL Configuration
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:50m;
    #     ssl_session_tickets off;
    #
    #     # Modern SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}

