# Docker Compose Development Configuration for rdtect OS
#
# Usage:
#   docker compose -f docker-compose.dev.yml up              # Services only (pocketbase, python-backend)
#   docker compose -f docker-compose.dev.yml --profile full up  # Full stack including frontend
#   docker compose -f docker-compose.dev.yml --profile all up   # Everything including excalidraw-remote
#
# For local frontend development (recommended):
#   docker compose -f docker-compose.dev.yml up -d && bun run dev

services:
  # ==============================================================================
  # Core Services (always started)
  # ==============================================================================

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: rdtect-pocketbase-dev
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_dev_data:/pb_data
      - ./data/pb_migrations:/pb_migrations:ro
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  python-backend:
    build:
      context: ./apps/python-backend
      dockerfile: Dockerfile
    container_name: rdtect-python-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reload
      - ./apps/python-backend/src:/app:cached
      # Mount requirements for easy updates (rebuild needed for new deps)
      - ./apps/python-backend/requirements.txt:/requirements.txt:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==============================================================================
  # Frontend Service (profile: full)
  # ==============================================================================

  frontend:
    image: oven/bun:latest
    container_name: rdtect-frontend-dev
    profiles:
      - full
      - all
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      # Mount entire project for monorepo support
      - .:/app:cached
      # Use anonymous volume for node_modules to avoid conflicts
      - /app/node_modules
      # Cache bun install
      - bun_cache:/root/.bun
    environment:
      - NODE_ENV=development
      - VITE_POCKETBASE_URL=http://pocketbase:8090
      - VITE_PYTHON_BACKEND_URL=http://python-backend:8000
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 5173"
    depends_on:
      pocketbase:
        condition: service_healthy
      python-backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==============================================================================
  # Federation Apps (profile: all)
  # ==============================================================================

  excalidraw-remote:
    image: oven/bun:latest
    container_name: rdtect-excalidraw-dev
    profiles:
      - all
    working_dir: /app/apps/excalidraw-remote
    ports:
      - "5004:5004"
    volumes:
      # Mount entire project for workspace resolution
      - .:/app:cached
      - /app/node_modules
      - /app/apps/excalidraw-remote/node_modules
      - bun_cache_excalidraw:/root/.bun
    environment:
      - NODE_ENV=development
    command: sh -c "cd /app && bun install && cd /app/apps/excalidraw-remote && bun run dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

# ==============================================================================
# Volumes
# ==============================================================================

volumes:
  pocketbase_dev_data:
    name: rdtect_pocketbase_dev_data
  bun_cache:
    name: rdtect_bun_cache
  bun_cache_excalidraw:
    name: rdtect_bun_cache_excalidraw
