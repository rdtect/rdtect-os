# =============================================================================
# rdtect OS - Production Docker Compose
# =============================================================================
# Deploy with: docker compose -f docker-compose.prod.yml up -d
# For Coolify: Set this as the compose file in deployment settings
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Frontend - SvelteKit Application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PUBLIC_POCKETBASE_URL=${PUBLIC_POCKETBASE_URL:-http://pocketbase:8090}
      - PUBLIC_PYTHON_BACKEND_URL=${PUBLIC_PYTHON_BACKEND_URL:-http://python-backend:8000}
      - PUBLIC_PISTON_URL=${PUBLIC_PISTON_URL:-http://piston:2000}
      - ORIGIN=${ORIGIN:-https://rdtect.com}
    depends_on:
      pocketbase:
        condition: service_healthy
      python-backend:
        condition: service_started
    networks:
      - rdtect-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`rdtect.com`) || Host(`www.rdtect.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # PocketBase - Database + Auth + Admin
  # ---------------------------------------------------------------------------
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pocketbase_data:/pb_data
      - pocketbase_public:/pb_public
    environment:
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:-admin@rdtect.dev}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:-changeme123}
    networks:
      - rdtect-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.pocketbase.rule=Host(`pb.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.pocketbase.entrypoints=websecure"
      - "traefik.http.routers.pocketbase.tls.certresolver=letsencrypt"
      - "traefik.http.services.pocketbase.loadbalancer.server.port=8090"

  # ---------------------------------------------------------------------------
  # Python Backend - AI/OpenAI Integration
  # ---------------------------------------------------------------------------
  python-backend:
    build:
      context: ./apps/python-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - POCKETBASE_URL=${POCKETBASE_URL:-http://pocketbase:8090}
      - PYTHONUNBUFFERED=1
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - rdtect-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ---------------------------------------------------------------------------
  # Piston - Code Execution Engine (Optional)
  # ---------------------------------------------------------------------------
  piston:
    image: ghcr.io/engineer-man/piston
    restart: unless-stopped
    volumes:
      - piston_packages:/piston/packages
    networks:
      - rdtect-network
    # Resource limits for security (code execution can be resource-intensive)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/api/v2/runtimes"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "coolify.managed=true"
    profiles:
      - code-execution  # Only starts when explicitly requested

# =============================================================================
# Networks
# =============================================================================
networks:
  rdtect-network:
    driver: bridge

# =============================================================================
# Volumes - Persistent Data
# =============================================================================
volumes:
  pocketbase_data:
  pocketbase_public:
  piston_packages:
