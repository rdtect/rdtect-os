# =============================================================================
# rdtect OS - Production Docker Compose (Coolify)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend - SvelteKit Application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVICE_FQDN_FRONTEND_3000: ''
      NODE_ENV: production
      PUBLIC_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-https://pb.rdtect.com}
      ORIGIN: ${ORIGIN:-https://rdtect.com}
    expose:
      - '3000'
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.docker.network=coolify
    networks:
      - default
      - coolify

  # ---------------------------------------------------------------------------
  # PocketBase - Database + Auth + Admin
  # ---------------------------------------------------------------------------
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    environment:
      SERVICE_FQDN_POCKETBASE_8090: ''
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL:-admin@rdtect.dev}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD:-changeme123}
    expose:
      - '8090'
    volumes:
      - pocketbase_data:/pb_data
      - pocketbase_public:/pb_public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.docker.network=coolify
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true

volumes:
  pocketbase_data:
  pocketbase_public:
