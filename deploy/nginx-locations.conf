# =============================================================================
# rdtect OS - Nginx Location Configuration
# =============================================================================
# Include this file in your server blocks: include /etc/nginx/conf.d/locations.conf;
# =============================================================================

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# -------------------------------------------------------------------------
# Health Check Endpoint
# -------------------------------------------------------------------------
location /health {
    access_log off;
    return 200 "OK\n";
    add_header Content-Type text/plain;
}

# -------------------------------------------------------------------------
# API Routes -> Python Backend
# -------------------------------------------------------------------------
location /api {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass http://python_backend;
    proxy_http_version 1.1;

    # WebSocket support for streaming chat
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long-running AI requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Don't buffer for streaming responses (important for AI chat)
    proxy_buffering off;
    chunked_transfer_encoding on;
}

# -------------------------------------------------------------------------
# PocketBase Admin UI -> /_/
# -------------------------------------------------------------------------
location /_/ {
    limit_req zone=api_limit burst=10 nodelay;

    proxy_pass http://pocketbase/_/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support for real-time features
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# -------------------------------------------------------------------------
# PocketBase API -> /pb/
# -------------------------------------------------------------------------
location /pb/ {
    limit_req zone=api_limit burst=20 nodelay;

    # Rewrite /pb/ to / for pocketbase
    rewrite ^/pb/(.*)$ /$1 break;
    proxy_pass http://pocketbase;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support for real-time subscriptions
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# -------------------------------------------------------------------------
# PocketBase API Direct (alternative path)
# -------------------------------------------------------------------------
location ~ ^/api/collections {
    proxy_pass http://pocketbase;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# -------------------------------------------------------------------------
# Static Assets with Aggressive Caching
# -------------------------------------------------------------------------
location ~* ^/_app/immutable/ {
    proxy_pass http://frontend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache immutable assets for 1 year (SvelteKit content-hashed)
    expires 1y;
    add_header Cache-Control "public, immutable";
    gzip_static on;
}

location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
    proxy_pass http://frontend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache static assets for 7 days
    expires 7d;
    add_header Cache-Control "public";
    gzip_static on;
}

# -------------------------------------------------------------------------
# SvelteKit App (Fallback) - SPA Routing
# -------------------------------------------------------------------------
location / {
    limit_req zone=general_limit burst=50 nodelay;

    proxy_pass http://frontend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support for HMR in development / live features
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # No cache for HTML pages
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
}

# -------------------------------------------------------------------------
# Deny access to sensitive files
# -------------------------------------------------------------------------
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~ ^/(\.env|docker-compose|Dockerfile) {
    deny all;
    access_log off;
    log_not_found off;
}
