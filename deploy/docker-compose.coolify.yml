# =============================================================================
# rdtect OS - Coolify-Optimized Docker Compose
# =============================================================================
# This compose file is specifically designed for Coolify deployment.
# It removes direct port mappings (Coolify handles routing via Traefik)
# and uses Coolify's magic environment variables.
#
# Usage in Coolify:
# 1. Select this file as your Docker Compose file
# 2. Configure domains for each service in the Coolify UI
# 3. Set environment variables in Coolify's Environment Variables section
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend - SvelteKit Application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Use Coolify magic variables for service discovery
      - PUBLIC_POCKETBASE_URL=${SERVICE_URL_POCKETBASE:-http://pocketbase:8090}
      - PUBLIC_PYTHON_BACKEND_URL=${SERVICE_URL_PYTHON_BACKEND:-http://python-backend:8000}
      - ORIGIN=${SERVICE_FQDN_FRONTEND:-http://localhost:3000}
    depends_on:
      pocketbase:
        condition: service_healthy
      python-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "coolify.managed=true"

  # ---------------------------------------------------------------------------
  # PocketBase - Database + Auth + Admin
  # ---------------------------------------------------------------------------
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pocketbase_data:/pb_data
      - pocketbase_public:/pb_public
    environment:
      # Use Coolify magic variables for auto-generated passwords
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:?Admin email required}
      - POCKETBASE_ADMIN_PASSWORD=${SERVICE_PASSWORD_POCKETBASE:-changeme123}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "coolify.managed=true"

  # ---------------------------------------------------------------------------
  # Python Backend - AI/OpenAI Integration
  # ---------------------------------------------------------------------------
  python-backend:
    build:
      context: ../apps/python-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OpenAI API key required}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - POCKETBASE_URL=http://pocketbase:8090
      - PYTHONUNBUFFERED=1
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "coolify.managed=true"

# =============================================================================
# Volumes - Persistent Data
# =============================================================================
volumes:
  pocketbase_data:
    name: rdtect-pocketbase-data
  pocketbase_public:
    name: rdtect-pocketbase-public
